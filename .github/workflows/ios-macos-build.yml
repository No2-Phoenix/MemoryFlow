name: ios-macos-build

on:
  workflow_dispatch:
    inputs:
      signed:
        description: Build signed App Store IPA (requires Apple signing secrets)
        required: true
        type: boolean
        default: false
      flutter_version:
        description: Flutter version
        required: true
        type: string
        default: 3.41.5

jobs:
  unsigned_archive:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: memoryflow
        run: flutter pub get

      - name: Build iOS archive without codesign
        working-directory: memoryflow
        run: flutter build ipa --release --no-codesign

      - name: Upload unsigned iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-artifacts
          if-no-files-found: warn
          path: |
            memoryflow/build/ios/archive/**
            memoryflow/build/ios/ipa/**

  signed_appstore_ipa:
    if: ${{ inputs.signed }}
    runs-on: macos-14
    env:
      APPLE_P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD || secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(APPLE_P12_BASE64 APPLE_P12_PASSWORD APPLE_PROVISIONING_PROFILE_BASE64 APPLE_TEAM_ID APPLE_BUNDLE_ID KEYCHAIN_PASSWORD)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              if [ "$key" = "KEYCHAIN_PASSWORD" ]; then
                echo "Missing required secret: APPLE_KEYCHAIN_PASSWORD (or KEYCHAIN_PASSWORD)"
              else
                echo "Missing required secret: $key"
              fi
              exit 1
            fi
          done

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: memoryflow
        run: flutter pub get

      - name: Install iOS dependencies
        working-directory: memoryflow/ios
        run: |
          pod repo update
          pod install

      - name: Import signing certificate and provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo -n "$APPLE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          PROFILE_DST="$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          mv "$HOME/Library/MobileDevice/Provisioning Profiles/$(basename "$PROFILE_PATH")" "$PROFILE_DST"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Build signed archive
        working-directory: memoryflow/ios
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APPLE_BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive

      - name: Export App Store IPA
        working-directory: memoryflow/ios
        shell: bash
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$APPLE_BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          if-no-files-found: error
          path: |
            memoryflow/build/ios/ipa/*.ipa
            memoryflow/build/ios/archive/Runner.xcarchive/**
